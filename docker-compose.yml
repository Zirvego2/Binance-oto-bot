name: binance-futures-bot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_bot}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_bot} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading_bot}:${POSTGRES_PASSWORD:-trading_bot}@postgres:5432/${POSTGRES_DB:-trading_bot}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading_bot}:${POSTGRES_PASSWORD:-trading_bot}@postgres:5432/${POSTGRES_DB:-trading_bot}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      PORT: 8000
    volumes:
      - ./${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}:/app/${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading_bot}:${POSTGRES_PASSWORD:-trading_bot}@postgres:5432/${POSTGRES_DB:-trading_bot}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}:/app/${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-/api/v1}
        NEXT_PUBLIC_SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-trading_bot_session}
    restart: unless-stopped
    environment:
      PORT: 3000
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
