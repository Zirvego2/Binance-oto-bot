# Production HTTPS config — setup_ssl.sh sertifika aldiktan sonra nginx.conf olarak kopyalanir.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    client_max_body_size 2m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream web_upstream {
        server web:3000;
    }

    upstream api_upstream {
        server api:8000;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # HTTP -> HTTPS yonlendirme + sertifika yenileme
    server {
        listen 80 default_server;
        server_name novexcrypto.com www.novexcrypto.com 185.22.184.249 _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://novexcrypto.com$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name novexcrypto.com;

        ssl_certificate     /etc/letsencrypt/live/novexcrypto.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/novexcrypto.com/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location /api/v1/ws/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # www -> apex
    server {
        listen 443 ssl;
        http2 on;
        server_name www.novexcrypto.com;

        ssl_certificate     /etc/letsencrypt/live/novexcrypto.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/novexcrypto.com/privkey.pem;

        return 301 https://novexcrypto.com$request_uri;
    }
}
